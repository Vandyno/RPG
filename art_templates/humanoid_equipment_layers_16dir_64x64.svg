<svg xmlns="http://www.w3.org/2000/svg" width="1196" height="650" viewBox="0 0 1196 650">
  <defs>
    <style>
      .title { font: 700 18px sans-serif; fill: #e8e0c8; }
      .note { font: 12px sans-serif; fill: #cfc7b0; }
      .label { font: 10px sans-serif; fill: #d9d1bb; }
      .row { font: 700 12px sans-serif; fill: #f0d57a; }
      .frame { fill: none; stroke: #70a7ff; stroke-width: 1; }
      .safe { fill: rgba(80, 220, 150, 0.05); stroke: #50dc96; stroke-width: 0.7; stroke-dasharray: 3 2; }
      .collision { fill: none; stroke: #ff6f6f; stroke-width: 0.8; stroke-dasharray: 2 2; }
      .pivot { stroke: #ffdf5d; stroke-width: 1; }
      .anchor { fill: #ff9dd6; stroke: #111; stroke-width: 0.4; }
      .axis { stroke: #ffffff; stroke-width: 0.4; stroke-opacity: 0.45; }
    </style>
    <symbol id="equipment-frame" viewBox="0 0 64 64">
      <rect class="frame" x="0.5" y="0.5" width="63" height="63"/>
      <rect class="safe" x="8.5" y="4.5" width="47" height="55"/>
      <circle class="collision" cx="32" cy="40" r="10"/>
      <line class="axis" x1="32" y1="0" x2="32" y2="64"/>
      <line class="axis" x1="0" y1="40" x2="64" y2="40"/>
      <line class="pivot" x1="27" y1="40" x2="37" y2="40"/>
      <line class="pivot" x1="32" y1="35" x2="32" y2="45"/>
      <circle cx="32" cy="40" r="2" fill="#ffdf5d"/>
      <circle class="anchor" cx="32" cy="18" r="1.8"/>
      <circle class="anchor" cx="32" cy="30" r="1.8"/>
      <circle class="anchor" cx="32" cy="38" r="1.8"/>
      <circle class="anchor" cx="20" cy="34" r="1.8"/>
      <circle class="anchor" cx="44" cy="34" r="1.8"/>
      <circle class="anchor" cx="24" cy="42" r="1.4"/>
      <circle class="anchor" cx="40" cy="42" r="1.4"/>
    </symbol>
    <symbol id="equipment-row" viewBox="0 0 1024 64">
      <use href="#equipment-frame" x="0" y="0"/>
      <use href="#equipment-frame" x="64" y="0"/>
      <use href="#equipment-frame" x="128" y="0"/>
      <use href="#equipment-frame" x="192" y="0"/>
      <use href="#equipment-frame" x="256" y="0"/>
      <use href="#equipment-frame" x="320" y="0"/>
      <use href="#equipment-frame" x="384" y="0"/>
      <use href="#equipment-frame" x="448" y="0"/>
      <use href="#equipment-frame" x="512" y="0"/>
      <use href="#equipment-frame" x="576" y="0"/>
      <use href="#equipment-frame" x="640" y="0"/>
      <use href="#equipment-frame" x="704" y="0"/>
      <use href="#equipment-frame" x="768" y="0"/>
      <use href="#equipment-frame" x="832" y="0"/>
      <use href="#equipment-frame" x="896" y="0"/>
      <use href="#equipment-frame" x="960" y="0"/>
    </symbol>
  </defs>

  <text class="title" x="24" y="30">Humanoid equipment/layer template: 64x64, 16 directions</text>
  <text class="note" x="24" y="50">Pink dots = rough body anchors: head, chest, waist, hands, feet. Yellow = shared feet pivot. Paint layer art against the actor frame, not against frame center.</text>

  <g transform="translate(142,92)">
    <text class="label" transform="translate(32,-10) rotate(-45)">east</text>
    <text class="label" transform="translate(96,-10) rotate(-45)">east_southeast</text>
    <text class="label" transform="translate(160,-10) rotate(-45)">southeast</text>
    <text class="label" transform="translate(224,-10) rotate(-45)">south_southeast</text>
    <text class="label" transform="translate(288,-10) rotate(-45)">south</text>
    <text class="label" transform="translate(352,-10) rotate(-45)">south_southwest</text>
    <text class="label" transform="translate(416,-10) rotate(-45)">southwest</text>
    <text class="label" transform="translate(480,-10) rotate(-45)">west_southwest</text>
    <text class="label" transform="translate(544,-10) rotate(-45)">west</text>
    <text class="label" transform="translate(608,-10) rotate(-45)">west_northwest</text>
    <text class="label" transform="translate(672,-10) rotate(-45)">northwest</text>
    <text class="label" transform="translate(736,-10) rotate(-45)">north_northwest</text>
    <text class="label" transform="translate(800,-10) rotate(-45)">north</text>
    <text class="label" transform="translate(864,-10) rotate(-45)">north_northeast</text>
    <text class="label" transform="translate(928,-10) rotate(-45)">northeast</text>
    <text class="label" transform="translate(992,-10) rotate(-45)">east_northeast</text>

    <text class="row" x="-116" y="38">body_base</text>
    <use href="#equipment-row" x="0" y="0"/>
    <text class="row" x="-116" y="102">head</text>
    <use href="#equipment-row" x="0" y="64"/>
    <text class="row" x="-116" y="166">hair_features</text>
    <use href="#equipment-row" x="0" y="128"/>
    <text class="row" x="-116" y="230">chest</text>
    <use href="#equipment-row" x="0" y="192"/>
    <text class="row" x="-116" y="294">legs_boots</text>
    <use href="#equipment-row" x="0" y="256"/>
    <text class="row" x="-116" y="358">right_hand</text>
    <use href="#equipment-row" x="0" y="320"/>
    <text class="row" x="-116" y="422">left_hand</text>
    <use href="#equipment-row" x="0" y="384"/>
    <text class="row" x="-116" y="486">back</text>
    <use href="#equipment-row" x="0" y="448"/>
  </g>

  <text class="note" x="24" y="626">Use for smith apron, future armor/clothing, held weapons, shields, species feature overlays, hair, and back items.</text>
</svg>
