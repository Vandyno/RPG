<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430">
  <defs>
    <style>
      .title { font: 700 18px sans-serif; fill: #e8e0c8; }
      .note { font: 12px sans-serif; fill: #cfc7b0; }
      .label { font: 11px sans-serif; fill: #d9d1bb; }
      .section { font: 700 14px sans-serif; fill: #f0d57a; }
      .frame { fill: none; stroke: #70a7ff; stroke-width: 1; }
      .safe { fill: rgba(80, 220, 150, 0.06); stroke: #50dc96; stroke-width: 0.7; stroke-dasharray: 3 2; }
      .pivot { stroke: #ffdf5d; stroke-width: 1; }
      .grip { fill: #ff9dd6; stroke: #111; stroke-width: 0.4; }
      .footprint { fill: none; stroke: #ff6f6f; stroke-width: 0.8; stroke-dasharray: 2 2; }
    </style>
    <symbol id="icon32" viewBox="0 0 32 32">
      <rect class="frame" x="0.5" y="0.5" width="31" height="31"/>
      <rect class="safe" x="3.5" y="3.5" width="25" height="25"/>
      <line class="pivot" x1="12" y1="16" x2="20" y2="16"/>
      <line class="pivot" x1="16" y1="12" x2="16" y2="20"/>
      <circle cx="16" cy="16" r="1.6" fill="#ffdf5d"/>
    </symbol>
    <symbol id="ground32" viewBox="0 0 32 32">
      <rect class="frame" x="0.5" y="0.5" width="31" height="31"/>
      <rect class="safe" x="3.5" y="4.5" width="25" height="23"/>
      <ellipse class="footprint" cx="16" cy="20" rx="10" ry="5"/>
      <line class="pivot" x1="12" y1="20" x2="20" y2="20"/>
      <line class="pivot" x1="16" y1="16" x2="16" y2="24"/>
      <circle cx="16" cy="20" r="1.6" fill="#ffdf5d"/>
    </symbol>
    <symbol id="ground64x32" viewBox="0 0 64 32">
      <rect class="frame" x="0.5" y="0.5" width="63" height="31"/>
      <rect class="safe" x="3.5" y="4.5" width="57" height="23"/>
      <ellipse class="footprint" cx="32" cy="20" rx="26" ry="5"/>
      <line class="pivot" x1="27" y1="20" x2="37" y2="20"/>
      <line class="pivot" x1="32" y1="15" x2="32" y2="25"/>
      <circle cx="32" cy="20" r="1.8" fill="#ffdf5d"/>
    </symbol>
    <symbol id="held64" viewBox="0 0 64 64">
      <rect class="frame" x="0.5" y="0.5" width="63" height="63"/>
      <rect class="safe" x="5.5" y="5.5" width="53" height="53"/>
      <line class="pivot" x1="27" y1="40" x2="37" y2="40"/>
      <line class="pivot" x1="32" y1="35" x2="32" y2="45"/>
      <circle cx="32" cy="40" r="2" fill="#ffdf5d"/>
      <circle class="grip" cx="20" cy="34" r="2"/>
      <circle class="grip" cx="44" cy="34" r="2"/>
      <circle class="grip" cx="32" cy="34" r="2"/>
    </symbol>
  </defs>

  <text class="title" x="24" y="30">Item icons, ground sprites, and held item guide</text>
  <text class="note" x="24" y="50">Transparent background. Icons center on frame center. Ground sprites pivot at contact center. Held item pink dots are rough grip anchors.</text>

  <text class="section" x="24" y="86">32x32 inventory icons</text>
  <g transform="translate(24,104)">
    <use href="#icon32" x="0" y="0"/>
    <text class="label" x="0" y="48">gold_coin</text>
    <use href="#icon32" x="104" y="0"/>
    <text class="label" x="104" y="48">toolbox</text>
    <use href="#icon32" x="208" y="0"/>
    <text class="label" x="208" y="48">draught</text>
    <use href="#icon32" x="312" y="0"/>
    <text class="label" x="312" y="48">river_mint</text>
    <use href="#icon32" x="416" y="0"/>
    <text class="label" x="416" y="48">weapon_icon</text>
    <use href="#icon32" x="520" y="0"/>
    <text class="label" x="520" y="48">shield_icon</text>
    <use href="#icon32" x="624" y="0"/>
    <text class="label" x="624" y="48">spell_icon</text>
  </g>

  <text class="section" x="24" y="214">Ground pickup sprites</text>
  <g transform="translate(24,232)">
    <use href="#ground32" x="0" y="0"/>
    <text class="label" x="0" y="48">small_ground</text>
    <use href="#ground32" x="116" y="0"/>
    <text class="label" x="116" y="48">sword_ground</text>
    <use href="#ground32" x="232" y="0"/>
    <text class="label" x="232" y="48">hatchet_ground</text>
    <use href="#ground32" x="348" y="0"/>
    <text class="label" x="348" y="48">bow_ground</text>
    <use href="#ground32" x="464" y="0"/>
    <text class="label" x="464" y="48">buckler_ground</text>
    <use href="#ground64x32" x="580" y="0"/>
    <text class="label" x="580" y="48">polearm_ground_64x32</text>
  </g>

  <text class="section" x="24" y="340">64x64 held item layer frame</text>
  <g transform="translate(24,354)">
    <use href="#held64" x="0" y="0"/>
    <text class="label" x="0" y="82">one_hand_low</text>
    <use href="#held64" x="132" y="0"/>
    <text class="label" x="132" y="82">offhand_guard</text>
    <use href="#held64" x="264" y="0"/>
    <text class="label" x="264" y="82">two_hand_thrust</text>
    <use href="#held64" x="396" y="0"/>
    <text class="label" x="396" y="82">two_hand_aim</text>
  </g>
</svg>
